    background-size: cover;
    background-position: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    padding: 40px 20px 60px;
    gap: 24px;
  }

  .calc {
    width: 300px;
    background: #FDF4F4;
    border-radius: 24px;
    padding: 28px 24px 24px;
    border: 1px solid #ECC0C0;
  }

  .display {
    padding: 0 4px 20px;
    border-bottom: 1px solid #ECC0C0;
    margin-bottom: 20px;
  }

  .expr {
    font-size: 12px;
    color: #C09090;
    text-align: right;
    height: 18px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    letter-spacing: 0.5px;
  }

  .result {
    font-family: 'DM Serif Display', serif;
    font-size: 42px;
    color: #3A2020;
    text-align: right;
    line-height: 1.1;
    margin-top: 4px;
    min-height: 50px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    transition: color 0.15s;
  }

  .result.err {
    font-size: 18px;
    color: #E8846A;
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    padding-top: 16px;
  }

  .sci {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-bottom: 10px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }

  button {
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    border-radius: 12px;
    padding: 0;
    height: 58px;
    font-size: 16px;
    transition: background 0.1s, transform 0.08s;
    letter-spacing: 0.2px;
  }

  button:active { transform: scale(0.94); }
  button:focus { outline: none; }

  .btn-num {
    background: #FFFFFF;
    color: #3A2020;
    border: 1px solid #ECC0C0;
    font-size: 18px;
  }
  .btn-num:hover { background: #FDE8E8; }

  .btn-op {
    background: #F5D0D0;
    color: #7A3030;
    border: 1px solid #E8B8B8;
    font-size: 20px;
  }
  .btn-op:hover { background: #EEC0C0; }

  .btn-clear {
    background: #FAE0E0;
    color: #B06060;
    border: 1px solid #ECC8C8;
    font-size: 14px;
    letter-spacing: 0.5px;
  }
  .btn-clear:hover { background: #F2D0D0; }

  .btn-eq {
    background: #E8846A;
    color: #FFFFFF;
    border: none;
    font-size: 22px;
    grid-row: span 2;
    height: auto;
    border-radius: 12px;
  }
  .btn-eq:hover { background: #DF7460; }

  .btn-sci {
    background: transparent;
    color: #C09090;
    border: 1px solid #ECC0C0;
    font-size: 12px;
    height: 36px;
    letter-spacing: 0.3px;
    border-radius: 8px;
  }
  .btn-sci:hover { background: #FDE8E8; color: #7A3030; }

  .btn-zero {
    grid-column: span 2;
    text-align: left;
    padding-left: 22px;
  }
</style>
</head>
<body>

  <div class="calc">
    <div class="display">
      <div class="expr" id="expr"></div>
      <div class="result" id="display">0</div>
    </div>

    <div class="sci" id="sci">
      <button class="btn-sci" data-fn="sqrt">√</button>
      <button class="btn-sci" data-fn="pow2">x²</button>
      <button class="btn-sci" data-fn="log10">log</button>
      <button class="btn-sci" data-fn="ln">ln</button>
      <button class="btn-sci" data-fn="sin">sin</button>
      <button class="btn-sci" data-fn="cos">cos</button>
      <button class="btn-sci" data-fn="tan">tan</button>
      <button class="btn-sci" data-fn="pi">π</button>
    </div>

    <div class="grid" id="main">
      <button class="btn-clear" data-action="clear">AC</button>
      <button class="btn-clear" data-action="del">⌫</button>
      <button class="btn-op" data-op="%">%</button>
      <button class="btn-op" data-op="/">÷</button>

      <button class="btn-num" data-num="7">7</button>
      <button class="btn-num" data-num="8">8</button>
      <button class="btn-num" data-num="9">9</button>
      <button class="btn-op" data-op="*">×</button>

      <button class="btn-num" data-num="4">4</button>
      <button class="btn-num" data-num="5">5</button>
      <button class="btn-num" data-num="6">6</button>
      <button class="btn-op" data-op="-">−</button>

      <button class="btn-num" data-num="1">1</button>
      <button class="btn-num" data-num="2">2</button>
      <button class="btn-num" data-num="3">3</button>
      <button class="btn-op" data-op="+">+</button>

      <button class="btn-num btn-zero" data-num="0">0</button>
      <button class="btn-num" data-num=".">.</button>
      <button class="btn-eq" data-action="equals">=</button>
    </div>
  </div>

<script>
  const disp = document.getElementById('display');
  const expr = document.getElementById('expr');

  let cur = '0', expression = '', justCalc = false, lastResult = null;

  function setDisplay(v, err) {
    disp.textContent = v;
    disp.className = 'result' + (err ? ' err' : '');
  }

  function append(ch) {
    if (justCalc && !['+','-','*','/','^','%'].includes(ch)) { expression = ''; cur = ''; }
    justCalc = false;
    if (['+','-','*','/','^','%'].includes(ch)) {
      expression += (cur !== '' ? cur : lastResult ?? '0') + ' ' + ch + ' ';
      cur = '';
    } else {
      if (ch === '.' && cur.includes('.')) return;
      cur = (cur === '0' && ch !== '.') ? ch : cur + ch;
    }
    setDisplay(cur || '0');
    expr.textContent = expression + cur;
  }

  function calculate() {
    try {
      let e = (expression + cur).replace(/×/g,'*').replace(/÷/g,'/').replace(/−/g,'-');
      if (!e.trim()) return;
      const r = math.evaluate(e);
      const fmt = Number.isInteger(r) ? r.toString() : parseFloat(r.toPrecision(12)).toString();
      expr.textContent = e + ' =';
      setDisplay(fmt);
      lastResult = fmt; cur = fmt; expression = ''; justCalc = true;
    } catch {
      setDisplay('error', true);
      setTimeout(() => setDisplay(cur || '0'), 1200);
    }
  }

  function applyFn(fn) {
    const v = parseFloat(cur || lastResult || '0');
    let r, lbl;
    try {
      if (fn === 'sqrt')  { r = math.sqrt(v); lbl = 'sqrt(' + v + ')'; }
      else if (fn === 'pow2') { r = math.pow(v,2); lbl = v + '²'; }
      else if (fn === 'log10') { r = math.log10(v); lbl = 'log(' + v + ')'; }
      else if (fn === 'ln') { r = math.log(v); lbl = 'ln(' + v + ')'; }
      else if (fn === 'sin') { r = math.sin(math.unit(v,'deg')); lbl = 'sin(' + v + '°)'; }
      else if (fn === 'cos') { r = math.cos(math.unit(v,'deg')); lbl = 'cos(' + v + '°)'; }
      else if (fn === 'tan') { r = math.tan(math.unit(v,'deg')); lbl = 'tan(' + v + '°)'; }
      else if (fn === 'pi') { r = math.pi; lbl = 'π'; }
      const fmt = parseFloat(r.toPrecision(10)).toString();
      expr.textContent = lbl + ' =';
      setDisplay(fmt);
      cur = fmt; lastResult = fmt; expression = ''; justCalc = true;
    } catch { setDisplay('error', true); setTimeout(() => setDisplay(cur || '0'), 1200); }
  }

  document.getElementById('main').addEventListener('click', e => {
    const b = e.target.closest('button'); if (!b) return;
    if (b.dataset.num !== undefined) append(b.dataset.num);
    else if (b.dataset.op) append(b.dataset.op);
    else if (b.dataset.action === 'equals') calculate();
    else if (b.dataset.action === 'clear') { cur = '0'; expression = ''; lastResult = null; justCalc = false; setDisplay('0'); expr.textContent = ''; }
    else if (b.dataset.action === 'del') { if (justCalc) { cur = '0'; justCalc = false; setDisplay('0'); return; } cur = cur.slice(0,-1) || '0'; setDisplay(cur); expr.textContent = expression + cur; }
  });

  document.getElementById('sci').addEventListener('click', e => {
    const b = e.target.closest('button'); if (!b) return;
    if (b.dataset.fn) applyFn(b.dataset.fn);
  });

  document.addEventListener('keydown', e => {
    if ('0123456789.'.includes(e.key)) append(e.key);
    else if (['+','-','*','/','^','%'].includes(e.key)) append(e.key);
    else if (e.key === 'Enter' || e.key === '=') calculate();
    else if (e.key === 'Backspace') { cur = cur.slice(0,-1) || '0'; setDisplay(cur); expr.textContent = expression + cur; }
    else if (e.key === 'Escape') { cur = '0'; expression = ''; lastResult = null; justCalc = false; setDisplay('0'); expr.textContent = ''; }
  });
</script>
</body>
</html>
